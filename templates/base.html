<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Michael Williams | AI Security Engineer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Michael Williams — cybersecurity operations specialist and AI security builder focused on guardrail-first systems, evidence-first reporting, and safe failure.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Michael Williams | AI Security Engineer{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Cybersecurity operations foundation with AI security, guardrail engineering, and evidence-first SOC automation. 60+ enterprise clients, 48% MTTR reduction.{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://mwill20.github.io/ai-security-portfolio/{% endblock %}">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="{{ url_for('home') }}" class="logo">MW</a>
                <ul class="nav-links">
                    <li><a href="{{ url_for('home') }}">Home</a></li>
                    <li><a href="{{ url_for('about') }}">About</a></li>
                    <li><a href="{{ url_for('projects') }}">Projects</a></li>
                    <li><a href="mailto:mwil.ITmission@gmail.com?subject=Resume%20Request" class="btn btn-small btn-secondary" style="padding: 0.5rem 1rem; border-color: var(--accent-color); color: var(--accent-color);">Resume</a></li>
                    <li><a href="{{ url_for('home') }}#contact" class="btn btn-small btn-secondary" style="padding: 0.5rem 1rem; border-color: var(--accent-color); color: var(--accent-color);">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="content">
{% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="social-links" style="margin-bottom: 20px;">
                <a href="https://github.com/mwill20" aria-label="GitHub" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://www.linkedin.com/in/mwillitmission/" aria-label="LinkedIn" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <p>Designed &amp; Built by Michael Williams</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
